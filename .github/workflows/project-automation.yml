name: Project Automation

on:
  create:
  pull_request:
    types:
      - opened
      - ready_for_review
      - closed

env:
  PROJECT_NUMBER: 1
  PROJECT_OWNER: ${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────
  # Job 1: 브랜치 생성 → In Progress
  # 브랜치 이름에서 이슈 번호 추출 후 해당 이슈를 In Progress로 이동
  # 브랜치 네이밍: feat/#123-title 또는 fix/#123-title
  # ─────────────────────────────────────────
  move-to-in-progress:
    name: Move to In Progress
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'create' &&
      github.event.ref_type == 'branch' &&
      github.event.ref != 'main' &&
      github.event.ref != 'development'
    steps:
      - name: Extract issue number and move to In Progress
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ env.PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const branchName = context.ref;

            const match = branchName.match(/#?(\d+)/);
            if (!match) {
              console.log('브랜치 이름에서 이슈 번호를 찾을 수 없습니다:', branchName);
              return;
            }

            const issueNumber = parseInt(match[1]);
            console.log('이슈 번호:', issueNumber);

            await moveIssueToStatus(github, context, issueNumber, 'In Progress');

            // ── moveIssueToStatus 구현 ──────────────────────────────────
            async function moveIssueToStatus(github, context, issueNumber, statusName) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const projectNumber = parseInt(process.env.PROJECT_NUMBER);

              // 1. 이슈의 node_id 조회
              const issueRes = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const issueNodeId = issueRes.data.node_id;

              // 2. Project node_id 및 Status 필드 조회
              const projectQuery = `
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              let projectData;
              try {
                projectData = await github.graphql(projectQuery, { owner, number: projectNumber });
              } catch {
                const orgQuery = projectQuery.replace('user(login:', 'organization(login:');
                projectData = await github.graphql(orgQuery, { owner, number: projectNumber });
              }

              const project = projectData.user?.projectV2 ?? projectData.organization?.projectV2;
              const projectId = project.id;
              const statusField = project.fields.nodes.find(f => f.name === 'Status');
              const option = statusField?.options.find(o => o.name === statusName);

              if (!option) {
                console.log(`Status 옵션 "${statusName}"을 찾을 수 없습니다.`);
                return;
              }

              // 3. Project에서 이슈 아이템 조회
              const itemQuery = `
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100) {
                        nodes {
                          id
                          content { ... on Issue { id } }
                        }
                      }
                    }
                  }
                }
              `;
              const itemData = await github.graphql(itemQuery, { projectId });
              let itemId = itemData.node.items.nodes.find(i => i.content?.id === issueNodeId)?.id;

              // 4. 아이템이 없으면 Project에 추가
              if (!itemId) {
                const addMutation = `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item { id }
                    }
                  }
                `;
                const addRes = await github.graphql(addMutation, { projectId, contentId: issueNodeId });
                itemId = addRes.addProjectV2ItemById.item.id;
              }

              // 5. Status 업데이트
              const updateMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;
              await github.graphql(updateMutation, {
                projectId,
                itemId,
                fieldId: statusField.id,
                optionId: option.id,
              });

              console.log(`이슈 #${issueNumber} → ${statusName} 이동 완료`);
            }

  # ─────────────────────────────────────────
  # Job 2: PR 오픈 → In Review
  # PR 본문의 closes #123 키워드로 이슈를 In Review로 이동
  # ─────────────────────────────────────────
  move-to-in-review:
    name: Move to In Review
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review') &&
      github.event.pull_request.draft == false
    steps:
      - name: Move linked issues to In Review
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ env.PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const issuePattern = /(?:closes?|fixes?|resolves?)\s+#?(\d+)/gi;
            const matches = [...prBody.matchAll(issuePattern)];

            if (matches.length === 0) {
              console.log('PR 본문에서 연결된 이슈를 찾을 수 없습니다. "closes #이슈번호" 형식으로 작성하세요.');
              return;
            }

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              console.log('이슈', issueNumber, '→ In Review');
              await moveIssueToStatus(github, context, issueNumber, 'In Review');
            }

            async function moveIssueToStatus(github, context, issueNumber, statusName) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const projectNumber = parseInt(process.env.PROJECT_NUMBER);

              const issueRes = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const issueNodeId = issueRes.data.node_id;

              const projectQuery = `
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              let projectData;
              try {
                projectData = await github.graphql(projectQuery, { owner, number: projectNumber });
              } catch {
                const orgQuery = projectQuery.replace('user(login:', 'organization(login:');
                projectData = await github.graphql(orgQuery, { owner, number: projectNumber });
              }

              const project = projectData.user?.projectV2 ?? projectData.organization?.projectV2;
              const projectId = project.id;
              const statusField = project.fields.nodes.find(f => f.name === 'Status');
              const option = statusField?.options.find(o => o.name === statusName);

              if (!option) {
                console.log(`Status 옵션 "${statusName}"을 찾을 수 없습니다.`);
                return;
              }

              const itemQuery = `
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100) {
                        nodes {
                          id
                          content { ... on Issue { id } }
                        }
                      }
                    }
                  }
                }
              `;
              const itemData = await github.graphql(itemQuery, { projectId });
              let itemId = itemData.node.items.nodes.find(i => i.content?.id === issueNodeId)?.id;

              if (!itemId) {
                const addMutation = `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item { id }
                    }
                  }
                `;
                const addRes = await github.graphql(addMutation, { projectId, contentId: issueNodeId });
                itemId = addRes.addProjectV2ItemById.item.id;
              }

              const updateMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;
              await github.graphql(updateMutation, {
                projectId,
                itemId,
                fieldId: statusField.id,
                optionId: option.id,
              });

              console.log(`이슈 #${issueNumber} → ${statusName} 이동 완료`);
            }

  # ─────────────────────────────────────────
  # Job 3: PR merge → Done
  # PR 본문의 closes #123 키워드로 이슈를 Done으로 이동
  # ─────────────────────────────────────────
  move-to-done:
    name: Move to Done
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Move linked issues to Done
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ env.PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const issuePattern = /(?:closes?|fixes?|resolves?)\s+#?(\d+)/gi;
            const matches = [...prBody.matchAll(issuePattern)];

            if (matches.length === 0) {
              console.log('PR 본문에서 연결된 이슈를 찾을 수 없습니다.');
              return;
            }

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              console.log('이슈', issueNumber, '→ Done');
              await moveIssueToStatus(github, context, issueNumber, 'Done');
            }

            async function moveIssueToStatus(github, context, issueNumber, statusName) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const projectNumber = parseInt(process.env.PROJECT_NUMBER);

              const issueRes = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const issueNodeId = issueRes.data.node_id;

              const projectQuery = `
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              let projectData;
              try {
                projectData = await github.graphql(projectQuery, { owner, number: projectNumber });
              } catch {
                const orgQuery = projectQuery.replace('user(login:', 'organization(login:');
                projectData = await github.graphql(orgQuery, { owner, number: projectNumber });
              }

              const project = projectData.user?.projectV2 ?? projectData.organization?.projectV2;
              const projectId = project.id;
              const statusField = project.fields.nodes.find(f => f.name === 'Status');
              const option = statusField?.options.find(o => o.name === statusName);

              if (!option) {
                console.log(`Status 옵션 "${statusName}"을 찾을 수 없습니다.`);
                return;
              }

              const itemQuery = `
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100) {
                        nodes {
                          id
                          content { ... on Issue { id } }
                        }
                      }
                    }
                  }
                }
              `;
              const itemData = await github.graphql(itemQuery, { projectId });
              let itemId = itemData.node.items.nodes.find(i => i.content?.id === issueNodeId)?.id;

              if (!itemId) {
                const addMutation = `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item { id }
                    }
                  }
                `;
                const addRes = await github.graphql(addMutation, { projectId, contentId: issueNodeId });
                itemId = addRes.addProjectV2ItemById.item.id;
              }

              const updateMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;
              await github.graphql(updateMutation, {
                projectId,
                itemId,
                fieldId: statusField.id,
                optionId: option.id,
              });

              console.log(`이슈 #${issueNumber} → ${statusName} 이동 완료`);
            }
