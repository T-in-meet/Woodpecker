name: Deploy Production

# main 브랜치에 push(merge)될 때 실행
on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # Job 1: CI 검증 (lint + type-check + test + build)
  # 프로덕션 배포 전 마지막 코드 품질 확인
  # ─────────────────────────────────────────
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.PROD_APP_URL }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}

  # ─────────────────────────────────────────
  # Job 2: Vercel 프로덕션 배포
  # ci job 성공 후 실행
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    needs: [ci] # CI 통과 후 배포 진행
    environment: production # GitHub Environment로 관리 (선택사항, 수동 승인 설정 가능)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Vercel CLI 전역 설치
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Vercel 프로젝트와 연결 (production 환경 변수 사용)
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Production 빌드 생성
      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Vercel Production 환경에 배포 (--prod 플래그 = 실제 도메인에 반영)
      # woodpecker.vercel.app 이 최신 배포로 업데이트됨
      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
